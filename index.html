<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>SafeMap — Reportes de Seguridad Comunitaria</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #0D1B2A;
      --panel:  #1A2F45;
      --border: #2A4A6A;
      --amber:  #F59E0B;
      --ambd:   #D97706;
      --green:  #10B981;
      --red:    #EF4444;
      --sky:    #38BDF8;
      --text:   #E8EDF2;
      --muted:  #8BA5BE;
      --glass:  rgba(13,27,42,0.92);
      --r:      10px;
      --sh:     0 8px 32px rgba(0,0,0,.55);
    }
    html,body { height:100%; font-family:'Inter',sans-serif; background:var(--navy); color:var(--text); overflow:hidden; }
    #map { position:fixed; inset:0; z-index:0; }

    /* TOP BAR */
    #topbar {
      position:fixed; top:14px; left:50%; transform:translateX(-50%);
      z-index:900; display:flex; align-items:center; gap:10px;
      background:var(--glass); border:1px solid var(--border); border-radius:50px;
      padding:7px 14px 7px 11px; backdrop-filter:blur(18px); box-shadow:var(--sh);
      white-space:nowrap;
      max-width:calc(100vw - 20px);   /* nunca más ancho que la pantalla */
    }
    .logo { display:flex; align-items:center; gap:7px; font-weight:700; font-size:14px; letter-spacing:.4px; flex-shrink:0; }
    .dot  { width:9px; height:9px; border-radius:50%; background:var(--amber); box-shadow:0 0 7px var(--amber); animation:blink 2s infinite; flex-shrink:0; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
    .nb { display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; }
    .nb::-webkit-scrollbar { display:none; }
    .nbtn {
      background:transparent; border:1px solid var(--border); border-radius:18px;
      color:var(--muted); cursor:pointer; font-size:11px; font-family:inherit;
      font-weight:600; padding:4px 11px; transition:all .15s; letter-spacing:.2px;
      flex-shrink:0;
    }
    .nbtn:hover { background:var(--amber); border-color:var(--amber); color:var(--navy); }

    /* ── RESPONSIVE: pantallas angostas (celulares) ── */
    @media (max-width: 480px) {
      #topbar {
        top:calc(10px + env(safe-area-inset-top));
        left:10px; right:10px; transform:none;
        max-width:none; width:auto;
        padding:6px 10px 6px 12px;
        gap:8px;
        justify-content:space-between;
      }
      .logo { font-size:13px; gap:5px; }
      .nb { gap:4px; justify-content:space-between; flex:1; }
      .nbtn {
        font-size:0;             /* oculta el texto del botón */
        padding:0;               /* lo vuelve cuadrado, solo ícono */
        width:30px; height:30px;
        display:flex; align-items:center; justify-content:center;
        border-radius:50%;
        flex-shrink:0;
      }
      .nbtn::before {
        font-size:14px;          /* el ícono sí se muestra, vía contenido CSS */
      }
      #btn-notif::before  { content:'🔔'; }
      #btn-locate::before { content:'📍'; }
      #btn-reports::before{ content:'📋'; }
      #btn-profile::before{ content:'👤'; }
      #btn-logout::before { content:'🚪'; }

      #fab { bottom:20px; right:16px; width:48px; height:48px; font-size:24px; }

      #sidebar { width:100vw; }

      #profile { left:10px; right:10px; width:auto; top:64px; }

      #diag { left:10px; right:10px; width:auto; bottom:80px; }
    }

    @media (max-width: 380px) {
      #topbar { gap:5px; padding:6px 8px 6px 10px; }
      .logo { font-size:12px; }
      .logo span.logo-text { display:none; }  /* en pantallas muy angostas, solo el punto */
      .nb { gap:3px; }
      .nbtn { width:27px; height:27px; }
      .nbtn::before { font-size:13px; }
    }

    /* FAB */
    #fab {
      position:fixed; bottom:28px; right:24px; z-index:900;
      width:52px; height:52px; border-radius:50%;
      background:var(--amber); border:none; cursor:pointer; font-size:28px; font-weight:300;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 18px rgba(245,158,11,.55); transition:transform .15s,box-shadow .15s;
      line-height:1;
    }
    #fab:hover { transform:scale(1.09); box-shadow:0 6px 26px rgba(245,158,11,.7); }
    #fab.hidden { display:none; }

    /* OVERLAY */
    #overlay {
      position:fixed; inset:0; z-index:950;
      background:rgba(0,0,0,.65); backdrop-filter:blur(5px);
      display:flex; align-items:center; justify-content:center; padding:16px;
    }
    #overlay.hidden { display:none; }

    /* MODAL */
    .modal {
      background:var(--panel); border:1px solid var(--border); border-radius:var(--r);
      box-shadow:var(--sh); padding:26px; width:100%; max-width:410px;
      animation:up .18s ease;
    }
    @keyframes up { from{transform:translateY(16px);opacity:0} to{transform:none;opacity:1} }
    .modal h2 { font-size:18px; font-weight:700; margin-bottom:18px; }

    /* FORM ELEMENTS */
    .field { margin-bottom:13px; }
    .field label { display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.9px; margin-bottom:5px; }
    .field input, .field textarea {
      width:100%; background:var(--navy); border:1px solid var(--border);
      border-radius:6px; color:var(--text); font-family:inherit; font-size:14px;
      padding:9px 11px; outline:none; transition:border-color .15s;
    }
    .field input:focus, .field textarea:focus { border-color:var(--amber); }
    .field textarea { resize:vertical; min-height:78px; }

    .tgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
    .tbtn {
      background:var(--navy); border:1px solid var(--border); border-radius:7px;
      color:var(--muted); cursor:pointer; font-size:11px; font-family:inherit;
      font-weight:600; padding:9px 4px; display:flex; flex-direction:column;
      align-items:center; gap:4px; transition:all .15s;
    }
    .tbtn .ic { font-size:19px; }
    .tbtn:hover    { border-color:var(--amber); color:var(--text); }
    .tbtn.sel      { background:var(--amber); border-color:var(--amber); color:var(--navy); }

    /* BUTTONS */
    .btn { border:none; border-radius:6px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:600; padding:10px 18px; transition:all .15s; width:100%; }
    .pri { background:var(--amber); color:var(--navy); }
    .pri:hover { background:var(--ambd); }
    .pri:disabled { opacity:.5; cursor:not-allowed; }
    .ghost { background:transparent; border:1px solid var(--border); color:var(--muted); margin-top:7px; }
    .ghost:hover { border-color:var(--text); color:var(--text); }

    /* SIDEBAR */
    #sidebar {
      position:fixed; top:0; bottom:0; right:0; z-index:800; width:330px;
      background:var(--glass); border-left:1px solid var(--border); backdrop-filter:blur(22px);
      transform:translateX(100%); transition:transform .22s cubic-bezier(.4,0,.2,1);
      display:flex; flex-direction:column; padding-top:68px;
    }
    #sidebar.open { transform:none; }
    #sbhdr { padding:14px 18px 11px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    #sbhdr h3 { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
    #sbclose { background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; padding:2px 5px; }
    #sbclose:hover { color:var(--text); }
    #rlist { overflow-y:auto; flex:1; padding:10px 14px; }

    /* REPORT CARD */
    .card {
      background:rgba(255,255,255,.035); border:1px solid var(--border);
      border-radius:8px; margin-bottom:9px; padding:13px; cursor:pointer; transition:border-color .15s;
    }
    .card:hover { border-color:var(--amber); }
    .ctop { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
    .badge { font-size:17px; width:30px; height:30px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .cmeta { flex:1; min-width:0; }
    .ctype { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; }
    .ctime { font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
    .cdesc { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:9px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .cbar-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
    .cbar  { flex:1; height:4px; background:var(--navy); border-radius:2px; overflow:hidden; }
    .cfill { height:100%; border-radius:2px; transition:width .35s; }
    .cpct  { font-size:11px; font-family:'JetBrains Mono',monospace; font-weight:600; min-width:30px; text-align:right; }
    .vrow  { display:flex; gap:6px; }
    .vbtn  { flex:1; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--muted); font-family:inherit; font-size:11px; font-weight:700; padding:6px 0; cursor:pointer; transition:all .15s; }
    .vbtn.cv:hover { background:rgba(16,185,129,.15); border-color:var(--green); color:var(--green); }
    .vbtn.rv:hover { background:rgba(239,68,68,.15);  border-color:var(--red);   color:var(--red); }
    .vbtn.vc  { background:rgba(16,185,129,.2); border-color:var(--green); color:var(--green); }
    .vbtn.vr  { background:rgba(239,68,68,.2);  border-color:var(--red);   color:var(--red); }
    .exlbl { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--muted); flex-shrink:0; }
    .exlbl.urg { color:var(--red); }

    /* PROFILE */
    #profile {
      position:fixed; top:68px; left:14px; z-index:800; width:250px;
      background:var(--glass); border:1px solid var(--border); border-radius:var(--r);
      backdrop-filter:blur(22px); box-shadow:var(--sh); padding:18px; display:none;
    }
    #profile.open { display:block; animation:up .18s ease; }
    .pavatar { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,var(--amber),var(--sky)); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:var(--navy); margin:0 auto 12px; }
    .pname  { text-align:center; font-size:15px; font-weight:700; margin-bottom:3px; }
    .pemail { text-align:center; font-size:11px; color:var(--muted); margin-bottom:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pstat  { background:var(--navy); border:1px solid var(--border); border-radius:7px; padding:11px; text-align:center; margin-bottom:8px; }
    .psval  { font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:600; color:var(--amber); }
    .pslbl  { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-top:2px; }

    /* DIAGNOSTIC PANEL */
    #diag {
      position:fixed; bottom:96px; right:14px; left:auto; z-index:850; width:280px;
      background:var(--glass); border:1px solid var(--red); border-radius:var(--r);
      backdrop-filter:blur(18px); box-shadow:var(--sh); padding:14px; display:none;
    }
    #diag.open { display:block; animation:up .18s ease; }
    #diag h4 { font-size:12px; font-weight:700; color:var(--red); margin-bottom:10px; text-transform:uppercase; letter-spacing:.8px; }
    .ditem { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; font-size:12px; line-height:1.5; }
    .ditem .dicon { flex-shrink:0; margin-top:1px; }
    .ditem .dmsg  { color:var(--muted); }
    .ditem .dfix  { color:var(--amber); font-size:11px; margin-top:2px; }
    #diagclose { position:absolute; top:10px; right:12px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; }

    /* TOAST */
    #toast {
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
      z-index:9999; background:var(--panel); border:1px solid var(--border);
      border-radius:8px; padding:11px 18px; font-size:13px; font-weight:600;
      box-shadow:var(--sh); opacity:0; transition:opacity .18s; pointer-events:none; white-space:nowrap;
    }
    #toast.show { opacity:1; }

    /* LOADER */
    #loader { position:fixed; inset:0; z-index:9999; background:var(--navy); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
    #loader.hidden { display:none; }
    .spin { width:34px; height:34px; border:3px solid var(--border); border-top-color:var(--amber); border-radius:50%; animation:rot .7s linear infinite; }
    @keyframes rot { to{transform:rotate(360deg)} }
    #loader p { font-size:13px; color:var(--muted); }

    /* MISC */
    .errmsg { font-size:12px; color:var(--red); margin-top:7px; min-height:15px; line-height:1.4; }
    .swlink { text-align:center; font-size:12px; color:var(--muted); margin-top:13px; }
    .swlink a { color:var(--amber); cursor:pointer; font-weight:700; }
    hr.div { border:none; border-top:1px solid var(--border); margin:14px 0; }
    .empty { text-align:center; padding:36px 18px; color:var(--muted); }
    .empty .ei { font-size:34px; margin-bottom:10px; }
    .empty p { font-size:13px; line-height:1.6; }
    .infobox { font-size:12px; color:var(--muted); background:var(--navy); border:1px solid var(--border); border-radius:6px; padding:11px; margin-bottom:14px; line-height:1.7; }

    /* Leaflet overrides */
    .leaflet-control-zoom a { background:var(--panel)!important; color:var(--text)!important; border-color:var(--border)!important; }
    .leaflet-control-zoom a:hover { background:var(--amber)!important; color:var(--navy)!important; }
    .leaflet-popup-content-wrapper { background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:8px; box-shadow:var(--sh); }
    .leaflet-popup-tip { background:var(--panel); }
  </style>
</head>
<body>

<div id="loader"><div class="spin"></div><p>Cargando SafeMap...</p></div>
<div id="map"></div>

<div id="topbar">
  <div class="logo"><div class="dot"></div><span class="logo-text">SafeMap</span></div>
  <div class="nb">
    <button class="nbtn" id="btn-notif" title="Notificaciones del navegador">🔔</button>
    <button class="nbtn" id="btn-locate">Ubicarme</button>
    <button class="nbtn" id="btn-reports">Reportes</button>
    <button class="nbtn" id="btn-profile">Perfil</button>
    <button class="nbtn" id="btn-logout">Cerrar sesión</button>
  </div>
</div>

<button id="fab" class="hidden" title="Nuevo reporte">+</button>

<div id="sidebar">
  <div id="sbhdr">
    <h3>Reportes Activos</h3>
    <button id="sbclose">&#10005;</button>
  </div>
  <div id="rlist"></div>
</div>

<div id="profile"></div>

<!-- Panel de diagnóstico — aparece automáticamente si hay un problema de configuración -->
<div id="diag">
  <button id="diagclose">&#10005;</button>
  <h4>&#9888; Problema de configuración detectado</h4>
  <div id="diag-body"></div>
</div>

<div id="overlay" class="hidden"></div>
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// CONFIG  ← replace these two values, then open index.html
// ============================================================
// ── IMPORTANT ──────────────────────────────────────────────
// This is the Supabase ANON / PUBLIC key. It is designed to be
// embedded in client code (web, mobile, desktop) — it is NOT a
// secret. Real protection comes from Row Level Security (RLS),
// which is enabled on every table in database.sql.
//
// Never put your `service_role` key here — that one IS secret
// and bypasses RLS entirely. Only the anon key belongs in this
// file.
// ─────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://lnsvmcthudqmzzuvxcfh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxuc3ZtY3RodWRxbXp6dXZ4Y2ZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NzcyNTUsImV4cCI6MjA5ODE1MzI1NX0.OtI_fTClgw6LvtKDhWvxuX6i6dbGJe76u2tNUvCLGIs';

// ============================================================
// REPORT TYPES
// ============================================================
const TYPES = {
  accident:   { label:'Accidente',   icon:'🚗', color:'#F59E0B' },
  theft:      { label:'Robo',        icon:'🔓', color:'#EF4444' },
  hazard:     { label:'Peligro',     icon:'⚠️',  color:'#F97316' },
  flooding:   { label:'Inundación',  icon:'🌊', color:'#38BDF8' },
  fire:       { label:'Incendio',    icon:'🔥', color:'#DC2626' },
  suspicious: { label:'Sospechoso',  icon:'👁️',  color:'#A855F7' },
  kidnapping: { label:'Secuestro',   icon:'🚨', color:'#B91C1C' },
};

// ============================================================
// STATE
// ============================================================
let sb, map, userMarker;
let markers     = {};   // report.id -> L.Marker
let currentUser = null;
let myVotes     = {};   // report_id -> 'confirm'|'reject'
let rtChan      = null;
let clickLL     = null; // latlng from map click

// ============================================================
// BOOT — runs on DOMContentLoaded
// ============================================================
async function boot() {
  updateNotifButton();

  // Detect placeholder config early and show a helpful error
  if (SUPABASE_URL.includes('YOUR_PROJECT_ID') || SUPABASE_ANON.includes('YOUR_ANON_KEY')) {
    showDiag([{
      icon: '🔑',
      msg:  'Credenciales de Supabase no configuradas.',
      fix:  'Abre index.html y reemplaza SUPABASE_URL y SUPABASE_ANON al inicio del script.',
    }]);
    g('loader').classList.add('hidden');
    return;
  }

  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Verify the database is reachable and the profiles table exists
  const probe = await sb.from('profiles').select('id').limit(1);
  if (probe.error) {
    showDiag(diagFromError('profiles', probe.error));
    g('loader').classList.add('hidden');
    return;
  }

  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await onLoggedIn();
  } else {
    showAuthModal('login');
  }

  g('loader').classList.add('hidden');
}

// ============================================================
// DIAGNOSTIC HELPERS
// ============================================================
function diagFromError(table, err) {
  const code = err?.code || '';
  const msg  = err?.message || String(err);
  const items = [];

  if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
    items.push({
      icon: '🌐',
      msg:  'No se puede conectar con Supabase. Revisa tu SUPABASE_URL.',
      fix:  'Panel de Supabase → Settings → API → copia "Project URL".',
    });
  } else if (code === '42P01' || msg.includes('does not exist')) {
    items.push({
      icon: '🗄️',
      msg:  `Tabla "${table}" no encontrada.`,
      fix:  'Ejecuta database.sql en el Editor SQL de Supabase (ícono SQL en la barra lateral).',
    });
  } else if (code === '42501' || msg.includes('permission denied')) {
    items.push({
      icon: '🔒',
      msg:  'Permiso denegado — las políticas RLS pueden estar mal configuradas.',
      fix:  'Vuelve a ejecutar database.sql. Elimina y recrea todas las políticas.',
    });
  } else if (msg.includes('JWT') || msg.includes('Invalid API key')) {
    items.push({
      icon: '🔑',
      msg:  'API key inválida.',
      fix:  'Panel de Supabase → Settings → API → copia la "anon public" key en SUPABASE_ANON.',
    });
  } else {
    items.push({ icon: '❌', msg: msg, fix: 'Revisa la consola del navegador para más detalles.' });
  }
  return items;
}

function showDiag(items) {
  const body = items.map(i => `
    <div class="ditem">
      <span class="dicon">${i.icon}</span>
      <div>
        <div class="dmsg">${escHtml(i.msg)}</div>
        <div class="dfix">${escHtml(i.fix)}</div>
      </div>
    </div>
  `).join('');
  g('diag-body').innerHTML = body;
  g('diag').classList.add('open');
}

// ============================================================
// MAP SETUP
// ============================================================
function setupMap() {
  // Desactivamos el control de zoom por defecto (top-left) porque
  // choca con la barra superior en pantallas angostas. Lo volvemos
  // a agregar manualmente en la esquina inferior derecha, donde
  // nunca se cruza con la barra superior ni con el botón flotante.
  map = L.map('map', { zoomControl: false }).setView([37.7749, -122.4194], 13);

  L.control.zoom({ position: 'bottomleft' }).addTo(map);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  // Clicking the map sets the location for a new report
  map.on('click', (e) => {
    if (!currentUser) return;
    clickLL = e.latlng;
    showNewReportModal();
  });
}

// ============================================================
// AUTH MODAL
// ============================================================
function showAuthModal(mode) {
  const login = mode === 'login';
  showOverlay(`
    <div class="modal">
      <h2>${login ? 'Iniciar sesión' : 'Crear cuenta'}</h2>

      ${!login ? `
      <div class="field">
        <label>Nombre de usuario</label>
        <input id="f-un" type="text" placeholder="tu_usuario" autocomplete="off"
               maxlength="20" />
      </div>` : ''}

      <div class="field">
        <label>Correo electrónico</label>
        <input id="f-em" type="email" placeholder="tucorreo@ejemplo.com"
               autocomplete="${login ? 'username' : 'email'}" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input id="f-pw" type="password" placeholder="mínimo 6 caracteres"
               autocomplete="${login ? 'current-password' : 'new-password'}" />
      </div>

      <div class="errmsg" id="aerr"></div>

      <button class="btn pri" id="abtn">${login ? 'Iniciar sesión' : 'Crear cuenta'}</button>
      <p class="swlink">
        ${login
          ? '¿Eres nuevo? <a id="asw">Crear una cuenta</a>'
          : '¿Ya tienes cuenta? <a id="asw">Iniciar sesión</a>'}
      </p>
    </div>
  `);

  g('abtn').onclick = () => doAuth(mode);
  g('asw').onclick  = () => showAuthModal(login ? 'register' : 'login');
  ['f-em','f-pw','f-un'].forEach(id => {
    const el = g(id);
    if (el) el.onkeydown = e => { if (e.key === 'Enter') doAuth(mode); };
  });

  // Auto-focus first field
  setTimeout(() => (g('f-un') || g('f-em'))?.focus(), 50);
}

async function doAuth(mode) {
  const email = v('f-em');
  const pw    = v('f-pw');
  const err   = g('aerr');
  const btn   = g('abtn');

  // ── Validación del lado del cliente ─────────────────────
  if (!email)     { err.textContent = 'El correo electrónico es obligatorio.'; return; }
  if (!pw)        { err.textContent = 'La contraseña es obligatoria.'; return; }
  if (pw.length < 6) { err.textContent = 'La contraseña debe tener al menos 6 caracteres.'; return; }
  if (!email.includes('@')) { err.textContent = 'Ingresa un correo electrónico válido.'; return; }

  btn.disabled = true;
  btn.textContent = 'Espera un momento...';
  err.textContent = '';

  // ── REGISTRO ─────────────────────────────────────────────
  if (mode === 'register') {
    const username = v('f-un');
    if (!username) {
      err.textContent = 'El nombre de usuario es obligatorio.';
      btn.disabled = false; btn.textContent = 'Crear cuenta'; return;
    }
    if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
      err.textContent = 'Usuario: 3-20 caracteres, solo letras, números y guion bajo.';
      btn.disabled = false; btn.textContent = 'Crear cuenta'; return;
    }

    const { data, error } = await sb.auth.signUp({
      email,
      password: pw,
      options:  { data: { username } },
    });

    if (error) {
      err.textContent = friendlyAuthError(error);
      btn.disabled = false; btn.textContent = 'Crear cuenta'; return;
    }

    if (data?.session) {
      // Email confirmation is OFF in Supabase -> logged in immediately
      currentUser = data.user;
      closeOverlay();
      await onLoggedIn();

    } else if (data?.user) {
      // Email confirmation is ON -> tell the user what to do
      showOverlay(`
        <div class="modal">
          <h2>Revisa tu correo</h2>
          <p style="color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:14px">
            Enviamos un enlace de confirmación a
            <strong style="color:var(--text)">${escHtml(email)}</strong>.
            Haz clic en él para verificar tu cuenta y luego inicia sesión.
          </p>
          <div class="infobox">
            <strong>¿Quieres omitir la confirmación de correo?</strong><br>
            Panel de Supabase &rarr; Authentication &rarr; Providers &rarr; Email
            &rarr; desactiva <em>Confirm email</em> &rarr; regístrate de nuevo.
          </div>
          <button class="btn pri" id="go-login">Ir a iniciar sesión</button>
        </div>
      `);
      g('go-login').onclick = () => showAuthModal('login');

    } else {
      err.textContent = 'Respuesta inesperada del servidor. Revisa la consola del navegador.';
      console.error('signUp response:', data);
      btn.disabled = false; btn.textContent = 'Crear cuenta';
    }

  // ── INICIO DE SESIÓN ─────────────────────────────────────
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

    if (error) {
      err.textContent = friendlyAuthError(error);
      btn.disabled = false; btn.textContent = 'Iniciar sesión'; return;
    }

    currentUser = data.user;
    closeOverlay();
    await onLoggedIn();
  }
}

// Turn Supabase error messages into human-readable Spanish strings
function friendlyAuthError(error) {
  const m = (error.message || '').toLowerCase();
  if (m.includes('user already registered') || m.includes('already been registered'))
    return 'Ya existe una cuenta con este correo. Intenta iniciar sesión.';
  if (m.includes('invalid login credentials') || m.includes('invalid email or password'))
    return 'Correo o contraseña incorrectos.';
  if (m.includes('email not confirmed'))
    return 'Por favor confirma tu correo primero, luego inicia sesión.';
  if (m.includes('password should be'))
    return 'La contraseña debe tener al menos 6 caracteres.';
  if (m.includes('unable to validate email'))
    return 'Ingresa un correo electrónico válido.';
  if (m.includes('failed to fetch') || m.includes('networkerror'))
    return 'No se puede conectar al servidor. Revisa tu conexión a internet y la URL de Supabase.';
  return error.message || 'Algo salió mal. Por favor intenta de nuevo.';
}

// ============================================================
// POST-LOGIN
// ============================================================
async function onLoggedIn() {
  if (!map) setupMap();
  g('fab').classList.remove('hidden');

  // Load this user's past votes so confirm/reject buttons render correctly
  const { data: votes } = await sb
    .from('votes')
    .select('report_id, vote')
    .eq('user_id', currentUser.id);
  if (votes) votes.forEach(v => { myVotes[v.report_id] = v.vote; });

  await loadReports();
  subscribeRealtime();
  locateUser();
  requestNotificationPermission();
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  myVotes     = {};
  if (rtChan) { sb.removeChannel(rtChan); rtChan = null; }
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  closeSidebar();
  closeProfile();
  g('fab').classList.add('hidden');
  showAuthModal('login');
}

// ============================================================
// REPORTS — load & render
// ============================================================
async function loadReports() {
  const { data, error } = await sb
    .from('reports')
    .select('*')
    .gt('expires_at', new Date().toISOString())
    .order('created_at', { ascending: false });

  if (error) {
    showToast('No se pudieron cargar los reportes.');
    console.error(error);
    return;
  }
  (data || []).forEach(putMarker);
}

function putMarker(r) {
  const t = TYPES[r.type] || TYPES.hazard;
  const icon = L.divIcon({
    className: '',
    html: `<div style="background:${t.color};width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:15px;line-height:1">${t.icon}</span></div>`,
    iconSize: [34, 34], iconAnchor: [17, 34],
  });
  if (markers[r.id]) map.removeLayer(markers[r.id]);
  const m = L.marker([r.lat, r.lng], { icon }).addTo(map);
  m.on('click', () => openSidebarAt(r.id));
  markers[r.id] = m;
}

// ============================================================
// SIDEBAR
// ============================================================
async function openSidebar() {
  const { data, error } = await sb
    .from('reports')
    .select('*')
    .gt('expires_at', new Date().toISOString())
    .order('created_at', { ascending: false });

  const list = g('rlist');

  if (error || !data?.length) {
    list.innerHTML = `<div class="empty"><div class="ei">🗺️</div><p>No hay reportes activos.<br>Haz clic en el mapa para agregar uno.</p></div>`;
  } else {
    list.innerHTML = data.map(cardHTML).join('');
    data.forEach(r => {
      g('vc-' + r.id).onclick = e => { e.stopPropagation(); castVote(r.id, 'confirm'); };
      g('vr-' + r.id).onclick = e => { e.stopPropagation(); castVote(r.id, 'reject'); };
      g('c-'  + r.id).onclick = () => map.flyTo([r.lat, r.lng], 16, { duration: 1 });
    });
  }
  g('sidebar').classList.add('open');
}

async function openSidebarAt(id) {
  await openSidebar();
  g('c-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function closeSidebar() { g('sidebar').classList.remove('open'); }

function cardHTML(r) {
  const t   = TYPES[r.type] || TYPES.hazard;
  const exp = expiresIn(r.expires_at);
  const vt  = myVotes[r.id];
  const cc  = r.confidence >= 70 ? '#10B981' : r.confidence >= 40 ? '#F59E0B' : '#EF4444';

  return `
    <div class="card" id="c-${r.id}">
      <div class="ctop">
        <div class="badge" style="background:${t.color}22">${t.icon}</div>
        <div class="cmeta">
          <div class="ctype" style="color:${t.color}">${t.label}</div>
          <div class="ctime">${timeAgo(r.created_at)}</div>
        </div>
        <span class="exlbl${exp.urg ? ' urg' : ''}">${exp.txt}</span>
      </div>
      <p class="cdesc">${escHtml(r.description)}</p>
      <div class="cbar-row">
        <div class="cbar"><div class="cfill" style="width:${r.confidence}%;background:${cc}"></div></div>
        <span class="cpct" style="color:${cc}">${r.confidence}%</span>
      </div>
      <div class="vrow">
        <button class="vbtn cv${vt === 'confirm' ? ' vc' : ''}" id="vc-${r.id}">&#10003; Confirmar (${r.confirms})</button>
        <button class="vbtn rv${vt === 'reject'  ? ' vr' : ''}" id="vr-${r.id}">&#10005; Rechazar (${r.rejects})</button>
      </div>
    </div>`;
}

// ============================================================
// VOTING
// ============================================================
async function castVote(reportId, vote) {
  if (!currentUser) { showToast('Inicia sesión para votar'); return; }
  if (myVotes[reportId] === vote) { showToast('Ya votaste así'); return; }

  const { error } = await sb.from('votes').upsert(
    { report_id: reportId, user_id: currentUser.id, vote },
    { onConflict: 'report_id,user_id' }
  );
  if (error) { showToast('Error al votar: ' + error.message); return; }

  myVotes[reportId] = vote;
  showToast(vote === 'confirm' ? '¡Confirmado!' : 'Rechazado');
  // Realtime will refresh the sidebar
}

// ============================================================
// NEW REPORT
// ============================================================
function showNewReportModal() {
  let selType = null;

  showOverlay(`
    <div class="modal">
      <h2>Nuevo Reporte</h2>

      <div class="field">
        <label>Tipo</label>
        <div class="tgrid" id="tg">
          ${Object.entries(TYPES).map(([k, t]) =>
            `<button class="tbtn" data-t="${k}"><span class="ic">${t.icon}</span>${t.label}</button>`
          ).join('')}
        </div>
      </div>

      <div class="field">
        <label>Descripción</label>
        <textarea id="rd" placeholder="Describe lo que está pasando. Sé específico y breve."></textarea>
      </div>

      <div class="field">
        <label>Ubicación</label>
        <div id="rloc" style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:6px 0">
          ${clickLL ? clickLL.lat.toFixed(5) + ', ' + clickLL.lng.toFixed(5) : 'Detectando GPS...'}
        </div>
      </div>

      <div class="errmsg" id="rerr"></div>
      <button class="btn pri" id="rsub">Enviar Reporte</button>
      <button class="btn ghost" id="rcan">Cancelar</button>
    </div>
  `);

  // If user opened via FAB (not map click), try GPS
  if (!clickLL) {
    navigator.geolocation?.getCurrentPosition(pos => {
      clickLL = L.latLng(pos.coords.latitude, pos.coords.longitude);
      const el = g('rloc');
      if (el) el.textContent = clickLL.lat.toFixed(5) + ', ' + clickLL.lng.toFixed(5);
    }, () => {
      const el = g('rloc');
      if (el) el.textContent = 'GPS no disponible — haz clic en el mapa.';
    });
  }

  g('tg').onclick = e => {
    const b = e.target.closest('.tbtn');
    if (!b) return;
    selType = b.dataset.t;
    document.querySelectorAll('.tbtn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
  };

  g('rsub').onclick = () => submitReport(selType);
  g('rcan').onclick = () => { closeOverlay(); clickLL = null; };
}

async function submitReport(type) {
  const desc = v('rd');
  const err  = g('rerr');
  const btn  = g('rsub');

  if (!type)   { err.textContent = 'Selecciona un tipo de reporte.'; return; }
  if (!desc)   { err.textContent = 'Agrega una descripción.'; return; }
  if (!clickLL){ err.textContent = 'Ubicación requerida — haz clic en el mapa para definirla.'; return; }

  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const { data, error } = await sb.from('reports').insert({
    user_id:     currentUser.id,
    type,
    description: desc,
    lat:         clickLL.lat,
    lng:         clickLL.lng,
  }).select().single();

  if (error) {
    err.textContent = error.message;
    btn.disabled = false; btn.textContent = 'Enviar Reporte'; return;
  }

  clickLL = null;
  closeOverlay();
  putMarker(data);
  showToast('¡Reporte enviado!');
}

// ============================================================
// PROFILE
// ============================================================
async function showProfile() {
  const p = g('profile');
  if (p.classList.contains('open')) { closeProfile(); return; }

  const [{ data: prof }, { count: total }] = await Promise.all([
    sb.from('profiles').select('*').eq('id', currentUser.id).single(),
    sb.from('reports').select('*', { count:'exact', head:true }).eq('user_id', currentUser.id),
  ]);

  p.innerHTML = `
    <div class="pavatar">${(prof?.username || 'U')[0].toUpperCase()}</div>
    <div class="pname">@${escHtml(prof?.username || 'desconocido')}</div>
    <div class="pemail">${escHtml(currentUser.email)}</div>
    <div class="pstat"><div class="psval">${prof?.reputation ?? 0}</div><div class="pslbl">Reputación</div></div>
    <div class="pstat"><div class="psval">${total ?? 0}</div><div class="pslbl">Reportes enviados</div></div>
    <hr class="div">
    <p style="font-size:11px;color:var(--muted);line-height:1.7">
      +1 reputación cuando tu reporte es confirmado.<br>
      -1 reputación cuando tu reporte es rechazado.
    </p>`;
  p.classList.add('open');
}

function closeProfile() { g('profile').classList.remove('open'); }

// ============================================================
// GEOLOCATION
// ============================================================
function locateUser() {
  if (!navigator.geolocation) { showToast('Geolocalización no compatible'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    if (userMarker) map.removeLayer(userMarker);
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:14px;height:14px;background:#38BDF8;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 6px rgba(56,189,248,.22)"></div>`,
      iconSize:[14,14], iconAnchor:[7,7],
    });
    userMarker = L.marker(ll, { icon }).addTo(map).bindPopup('<strong>Estás aquí</strong>');
    map.flyTo(ll, 15, { duration: 1.1 });
  }, () => showToast('No se pudo obtener tu ubicación'));
}

// ============================================================
// REALTIME
// ============================================================
function subscribeRealtime() {
  if (rtChan) sb.removeChannel(rtChan);
  rtChan = sb.channel('sm-rt')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'reports' }, ({ new:r }) => {
      if (new Date(r.expires_at) > new Date()) {
        putMarker(r);

        // No notificar al propio usuario sobre su propio reporte
        const isOwnReport = currentUser && r.user_id === currentUser.id;
        if (!isOwnReport) {
          const label = TYPES[r.type]?.label || 'incidente';
          showToast('Nuevo reporte de ' + label + ' cerca');
          notifyBrowser(
            'Nuevo reporte: ' + label,
            r.description?.slice(0, 90) || 'Toca para ver el detalle en SafeMap'
          );
        }

        if (g('sidebar').classList.contains('open')) openSidebar();
      }
    })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'reports' }, ({ new:r }) => {
      putMarker(r);
      if (g('sidebar').classList.contains('open')) openSidebar();
    })
    .on('postgres_changes', { event:'DELETE', schema:'public', table:'reports' }, ({ old:r }) => {
      if (markers[r.id]) { map.removeLayer(markers[r.id]); delete markers[r.id]; }
      if (g('sidebar').classList.contains('open')) openSidebar();
    })
    .subscribe();
}

// ============================================================
// NOTIFICACIONES DEL NAVEGADOR
// ============================================================
// Pide permiso al usuario para mostrar notificaciones del sistema.
// Se llama una sola vez, después de iniciar sesión.
async function requestNotificationPermission() {
  updateNotifButton();
  if (!('Notification' in window)) return; // navegador no compatible
  if (Notification.permission === 'default') {
    try { await Notification.requestPermission(); } catch (e) { /* ignorar */ }
  }
  updateNotifButton();
}

// Refleja en el botón de la campana si las notificaciones están
// activas, bloqueadas, o pendientes de decisión.
function updateNotifButton() {
  const btn = g('btn-notif');
  if (!btn) return;

  if (!('Notification' in window)) {
    btn.textContent = '🔕';
    btn.title = 'Tu navegador no soporta notificaciones';
    return;
  }

  if (Notification.permission === 'granted') {
    btn.textContent = '🔔';
    btn.title = 'Notificaciones activadas';
  } else if (Notification.permission === 'denied') {
    btn.textContent = '🔕';
    btn.title = 'Notificaciones bloqueadas — actívalas en la configuración del navegador';
  } else {
    btn.textContent = '🔔';
    btn.title = 'Activar notificaciones — haz clic para permitir';
  }
}

// Muestra una notificación del sistema si el permiso fue concedido.
// Si la pestaña está visible y enfocada, no es necesario duplicar
// con una notificación del SO además del toast — pero la mostramos
// igual porque el usuario explícitamente pidió ambas.
function notifyBrowser(title, body) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;

  try {
    const n = new Notification(title, {
      body,
      icon: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
      tag: 'safemap-report', // agrupa notificaciones repetidas
      silent: false,
    });
    n.onclick = () => { window.focus(); n.close(); };
    // Auto-cerrar después de unos segundos para no saturar
    setTimeout(() => n.close(), 8000);
  } catch (e) {
    // Algunos navegadores móviles lanzan error si no hay Service Worker
    console.warn('No se pudo mostrar la notificación del navegador:', e);
  }
}

// ============================================================
// UI HELPERS
// ============================================================
function showOverlay(html) {
  const el = g('overlay');
  el.innerHTML = html;
  el.classList.remove('hidden');
  el.onclick = e => { if (e.target === el) { closeOverlay(); clickLL = null; } };
}
function closeOverlay() { g('overlay').classList.add('hidden'); }

let _tt;
function showToast(msg) {
  const el = g('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

function timeAgo(iso) {
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)  return 'justo ahora';
  if (m < 60) return 'hace ' + m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return 'hace ' + h + 'h';
  return 'hace ' + Math.floor(h / 24) + 'd';
}

function expiresIn(iso) {
  const ms = new Date(iso) - Date.now();
  if (ms <= 0) return { txt:'Expirado', urg:true };
  const h = Math.floor(ms / 3600000);
  if (h < 1)  return { txt:'< 1h',  urg:true };
  if (h < 6)  return { txt:h + 'h', urg:true };
  return { txt:h + 'h', urg:false };
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const g = id  => document.getElementById(id);
const v = id  => (g(id)?.value || '').trim();

// ============================================================
// WIRE UP & START
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  g('btn-locate').onclick  = locateUser;
  g('btn-reports').onclick = () => g('sidebar').classList.contains('open') ? closeSidebar() : openSidebar();
  g('btn-profile').onclick = showProfile;
  g('btn-logout').onclick  = doLogout;
  g('sbclose').onclick     = closeSidebar;
  g('diagclose').onclick   = () => g('diag').classList.remove('open');
  g('fab').onclick         = () => { clickLL = null; showNewReportModal(); };

  g('btn-notif').onclick = async () => {
    if (!('Notification' in window)) {
      showToast('Tu navegador no soporta notificaciones');
      return;
    }
    if (Notification.permission === 'denied') {
      showToast('Notificaciones bloqueadas. Actívalas en la configuración del sitio en tu navegador.');
      return;
    }
    if (Notification.permission === 'granted') {
      showToast('Las notificaciones ya están activadas');
      return;
    }
    await Notification.requestPermission();
    updateNotifButton();
    showToast(
      Notification.permission === 'granted'
        ? '¡Notificaciones activadas!'
        : 'Notificaciones no concedidas'
    );
  };

  // Close profile when clicking elsewhere
  document.addEventListener('click', e => {
    const p = g('profile');
    if (p.classList.contains('open') && !p.contains(e.target) && e.target !== g('btn-profile')) {
      closeProfile();
    }
  });

  boot();
});
</script>
